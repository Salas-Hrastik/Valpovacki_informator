<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" role="img" aria-label="Grb Grada Valpova">
  <title>Grb Grada Valpova</title>
  <!-- Štit: zlatni rub + zeleno polje -->
  <path d="M6,7 H94 V63 C94,90 76,107 50,117 C24,107 6,90 6,63 Z" fill="#f3b714" stroke="#14301f" stroke-width="2.5"/>
  <path d="M12,13 H88 V62 C88,86 72,101 50,110 C28,101 12,86 12,62 Z" fill="#2f9e44"/>

  <g stroke="#14301f" stroke-width="1.3" stroke-linejoin="round">
    <!-- Lijevi bočni zid s kruništem -->
    <rect x="24" y="56" width="16" height="18" fill="#f3b714"/>
    <rect x="24" y="52" width="4" height="5" fill="#f3b714"/>
    <rect x="30" y="52" width="4" height="5" fill="#f3b714"/>
    <rect x="36" y="52" width="4" height="5" fill="#f3b714"/>
    <!-- Desni bočni zid s kruništem -->
    <rect x="60" y="56" width="16" height="18" fill="#f3b714"/>
    <rect x="60" y="52" width="4" height="5" fill="#f3b714"/>
    <rect x="66" y="52" width="4" height="5" fill="#f3b714"/>
    <rect x="72" y="52" width="4" height="5" fill="#f3b714"/>

    <!-- Glavni toranj (kula) -->
    <rect x="42" y="40" width="16" height="34" fill="#f3b714"/>
    <rect x="42" y="36" width="4" height="5" fill="#f3b714"/>
    <rect x="48" y="36" width="4" height="5" fill="#f3b714"/>
    <rect x="54" y="36" width="4" height="5" fill="#f3b714"/>

    <!-- Gornji uži toranj s kruništem i tornjićem -->
    <rect x="45" y="24" width="10" height="16" fill="#f3b714"/>
    <rect x="45" y="21" width="3" height="4" fill="#f3b714"/>
    <rect x="52" y="21" width="3" height="4" fill="#f3b714"/>
    <rect x="49" y="13" width="2" height="8" fill="#f3b714"/>
    <circle cx="50" cy="12" r="2.2" fill="#f3b714"/>

    <!-- Most s tri luka -->
    <rect x="18" y="78" width="64" height="4" fill="#f3b714"/>
    <rect x="20" y="82" width="60" height="13" fill="#f3b714"/>
  </g>

  <!-- Prozori (tamni) -->
  <rect x="47.5" y="28" width="5" height="6" fill="#14301f"/>
  <rect x="47" y="46" width="6" height="8" fill="#14301f"/>
  <rect x="29" y="60" width="6" height="9" fill="#14301f"/>
  <rect x="65" y="60" width="6" height="9" fill="#14301f"/>

  <!-- Lučni otvori mosta (zeleno polje) -->
  <g stroke="#14301f" stroke-width="1.1">
    <path d="M27,95 V90 A6,6 0 0 1 39,90 V95 Z" fill="#2f9e44"/>
    <path d="M44,95 V90 A6,6 0 0 1 56,90 V95 Z" fill="#2f9e44"/>
    <path d="M61,95 V90 A6,6 0 0 1 73,90 V95 Z" fill="#2f9e44"/>
  </g>
</svg>
