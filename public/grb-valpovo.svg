<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" role="img" aria-label="Grb Grada Valpova">
  <title>Grb Grada Valpova</title>
  <!-- Štit: zlatni rub + zeleno polje -->
  <path d="M6,6 H94 V62 C94,90 76,108 50,118 C24,108 6,90 6,62 Z" fill="#f5b50a" stroke="#173f1c" stroke-width="2.5"/>
  <path d="M12,12 H88 V61 C88,86 72,102 50,111 C28,102 12,86 12,61 Z" fill="#36a832"/>

  <!-- Most s tri luka (zlatni), lučni otvori zeleni -->
  <g stroke="#173f1c" stroke-width="1.2" stroke-linejoin="round">
    <rect x="14" y="78" width="72" height="3" fill="#f5b50a"/>
    <rect x="16" y="81" width="68" height="13" fill="#f5b50a"/>
    <path d="M21,94 V88 A6,6 0 0 1 33,88 V94 Z" fill="#36a832"/>
    <path d="M44,94 V88 A6,6 0 0 1 56,88 V94 Z" fill="#36a832"/>
    <path d="M67,94 V88 A6,6 0 0 1 79,88 V94 Z" fill="#36a832"/>
  </g>

  <!-- Toranj (kula) sa širom bazom, vitkim gornjim tornjem, kupolom i zastavicom -->
  <g fill="#f5b50a" stroke="#173f1c" stroke-width="1.3" stroke-linejoin="round">
    <!-- Baza s kruništem -->
    <rect x="31" y="52" width="28" height="29"/>
    <rect x="31" y="48" width="5" height="5"/>
    <rect x="42.5" y="48" width="5" height="5"/>
    <rect x="54" y="48" width="5" height="5"/>
    <!-- Vitki gornji toranj s kruništem -->
    <rect x="34" y="30" width="13" height="22"/>
    <rect x="34" y="26" width="3.2" height="5"/>
    <rect x="39" y="26" width="3.2" height="5"/>
    <rect x="44" y="26" width="3.2" height="5"/>
    <!-- Kupola -->
    <path d="M34,30 Q34,20 40.5,19 Q47,20 47,30 Z"/>
    <!-- Tornjić, kuglica i zastavica -->
    <rect x="39.7" y="10" width="1.6" height="9"/>
    <circle cx="40.5" cy="9" r="2"/>
    <path d="M41.3,10.5 L49,12.5 L41.3,14.5 Z"/>
  </g>

  <!-- Prozori (tamni) -->
  <rect x="36" y="60" width="5" height="9" fill="#173f1c"/>
  <rect x="49" y="60" width="5" height="9" fill="#173f1c"/>
  <rect x="38" y="36" width="5" height="8" fill="#173f1c"/>
</svg>
